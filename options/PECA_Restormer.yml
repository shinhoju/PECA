# general settings
name: PECA-Restormer
model_type: StereoImageCleanModel
scale: 1
num_gpu: 2
manual_seed: 100
find_unused_parameters: true

# dataset and data loader settings
datasets:
  train:
    name: TrainSet
    type: Dataset_RectifiedImage
    dataroot_gt: ./datasets/PECA/train/target_crops
    dataroot_lq: ./datasets/PECA/train/input_crops
    dataroot_gd: ./datasets/PECA/train/guide_crops
    geometric_augs: false

    filename_tmpl: '{}'
    io_backend:
      type: disk

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 4
    gt_size: 128   

    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: ValSet
    type: Dataset_RectifiedImage
    dataroot_gt: ./datasets/PECA/test/target
    dataroot_lq: ./datasets/PECA/test/input
    dataroot_gd: ./datasets/PECA/test/guide
    io_backend:
      type: disk

# network structures
network_g:
  type: StereoRestormer
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [4,6,6,8]
  num_refinement_blocks: 4
  heads: [1,2,4,8]
  ffn_expansion_factor: 2.66
  bias: False
  LayerNorm_type: WithBias
  dual_pixel_task: False
  search_range: 5
  direction_mode: uni
  temperature: 0.01
  enc_mode: sep
  lin: true
  residual: true

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  total_iter: 400000
  warmup_iter: -1 # no warm up
  use_grad_clip: true

  scheduler:
    type: TrueCosineAnnealingLR
    T_max: 400000
    eta_min: !!float 1e-6
  
  mixing_augs:
    mixup: false
    mixup_beta: 1.2
    use_identity: true

  optim_g:
    type: AdamW
    lr: !!float 3e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]
  
  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

# validation settings
val:
  window_size: 8
  val_freq: !!float 1e4
  save_img: false
  rgb2bgr: true
  use_image: true
  max_minibatch: 8

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 1000
  save_checkpoint_freq: !!float 1e4
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500